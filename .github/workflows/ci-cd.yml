name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # GitHub Actions is moving JS-based actions to Node 24; opt in early to avoid noisy warnings.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-check:
    name: Backend Check (FastAPI)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall app

  frontend-check:
    name: Frontend Check (React)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Trigger backend deploy hook
        env:
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        continue-on-error: true
        run: |
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK" ]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK is not set. Skipping backend deploy."
          else
            curl -fsS --retry 2 --retry-delay 2 -X POST "$RENDER_BACKEND_DEPLOY_HOOK" || {
              echo "WARN: backend deploy hook request failed (check secret URL / Render status)."
              exit 0
            }
          fi

      - name: Trigger frontend deploy hook
        env:
          RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        continue-on-error: true
        run: |
          if [ -z "$RENDER_FRONTEND_DEPLOY_HOOK" ]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK is not set. Skipping frontend deploy."
          else
            curl -fsS --retry 2 --retry-delay 2 -X POST "$RENDER_FRONTEND_DEPLOY_HOOK" || {
              echo "WARN: frontend deploy hook request failed (check secret URL / Render status)."
              exit 0
            }
          fi
