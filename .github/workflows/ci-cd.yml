name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-check:
    name: Backend Check (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall app

  frontend-check:
    name: Frontend Check (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger backend deploy hook
        env:
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK" ]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK is not set. Skipping backend deploy."
          else
            curl -fsS -X POST "$RENDER_BACKEND_DEPLOY_HOOK"
          fi

      - name: Trigger frontend deploy hook
        env:
          RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_FRONTEND_DEPLOY_HOOK" ]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK is not set. Skipping frontend deploy."
          else
            curl -fsS -X POST "$RENDER_FRONTEND_DEPLOY_HOOK"
          fi
