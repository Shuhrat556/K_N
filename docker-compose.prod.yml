version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: always
    container_name: kasbnoma_db_prod
    environment:
      POSTGRES_USER: ${DB_USER:-kasbnoma}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-password}
      POSTGRES_DB: ${DB_NAME:-kasbnoma}
    ports:
      - "5432:5432"
    volumes:
      - kasbnoma_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kasbnoma}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kasbnoma_network

  # Backend (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    container_name: kasbnoma_backend_prod
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-kasbnoma}:${DB_PASSWORD:-change-this-password}@db:5432/${DB_NAME:-kasbnoma}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      APP_NAME: ${APP_NAME:-Kasbnoma API}
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:create_app --host 0.0.0.0 --port 8000 --factory
    networks:
      - kasbnoma_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend (React + Express)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    container_name: kasbnoma_frontend_prod
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - kasbnoma_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kasbnoma_pg:
    driver: local

networks:
  kasbnoma_network:
    driver: bridge
